<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>치아 연대기 v7.5.1</title>
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7.5.1">
</head>
<body>
    <div id="intro-layer">
        <button id="start-btn-layer" onclick="startIntro()" ontouchend="startIntro()">
            <div id="start-btn-text">🎬 화면을 터치하세요</div>
        </button>
        <video id="intro-video" playsinline><source src="assets/intro.mp4" type="video/mp4"></video>
        <button id="skip-btn" onclick="skipIntro()">SKIP ⏩</button>
    </div>
    <div id="hell-video-layer" style="display:none;">
        <video id="hell-video" playsinline><source src="assets/hell.mp4" type="video/mp4"></video>
        <button id="skip-hell-btn" onclick="skipHellIntro()" style="display:none;">SKIP ⏩</button>
    </div>
    <div id="awaken-video-layer" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 35000; flex-direction: column; justify-content: center; align-items: center;">
        <video id="awaken-video" playsinline style="width: 100%; height: 100%; object-fit: cover; display: none;"><source src="assets/awaken.mp4" type="video/mp4"></video>
        <button id="skip-awaken-btn" onclick="skipAwakenIntro()" style="display:none; position: absolute; bottom: 50px; right: 20px; background: rgba(0,0,0,0.5); color: white; border: 1px solid white; padding: 8px 20px;">SKIP ⏩</button>
    </div>

    <div id="game-container">
        <nav id="top-nav">
            <button onclick="switchView('mine')" id="tab-mine" class="active">⛏️ 채굴/합성</button>
            <button onclick="switchView('refine')" id="tab-refine">🔥 Top8 제련</button>
            <button onclick="switchView('war')" id="tab-war">⚔️ 던전원정</button>
        </nav>
        <header>
            <div class="stats-bar">
                <span class="currency-group">
                    <span class="ui-gold-text">💰 <span id="gold-display">0</span></span>
                    <span class="ui-dia-text" style="margin-left:15px;">♦️ <span id="dia-display">0</span></span>
                </span>
            </div>
        </header>

        <main id="main-content">
            <div id="mine-view">
                <div style="position:absolute; top:10px; width:100%; text-align:center; z-index:5; pointer-events:none;">
                    <div style="font-size:10px; color:#aaa; text-shadow:1px 1px 0 #000; margin-bottom:2px;">현재 장비</div>
                    <div id="pickaxe-name" style="font-size:13px; font-weight:bold; color:var(--gold); text-shadow:1px 1px 0 #000;">허름한 나무 곡괭이</div>
                </div>
                <div id="mine-rock-area">
                    <div id="giant-tooth">🦷</div>
                    <div id="miner-char">⛏️</div>
                </div>
                <div style="position:absolute; bottom:10px; left:15px; display:flex; flex-direction:column; align-items:center; width:60px; z-index:10; pointer-events:auto;">
                    <div id="mine-dial" class="dial-base"><div class="dial-inner">⛏️</div></div>
                    <button id="auto-mine-btn" onclick="toggleAutoMine()" class="btn-toggle">자동 ON</button>
                </div>
                <div style="position:absolute; bottom:10px; right:15px; display:flex; flex-direction:column; align-items:center; width:60px; z-index:10; pointer-events:auto;">
                    <div id="merge-dial" class="dial-base" style="background: conic-gradient(#9b59b6 0%, #333 0%);"><div class="dial-inner">⚡</div></div>
                    <button id="auto-merge-btn" onclick="toggleAutoMerge()" class="btn-toggle" style="background:#9b59b6;">자동 ON</button>
                </div>
            </div>

            <div id="inventory-section">
                <div id="action-bar">
                    <button onclick="sortInventory()" class="btn-red">🔄 자동 정렬</button>
                    <button onclick="openShop()" class="btn-gold">💰 Upgrade Lab</button>
                </div>
                <div id="inventory-scroll-area">
                    <div id="inventory-grid"></div>
                </div>
            </div>

            <div id="refine-view" style="display:none;"><div class="refine-grid" id="refine-grid"></div></div>

            <div id="war-view" style="display:none;">
                <div id="mercenary-camp">
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:10px;">
                        <h4 style="color:var(--gold); margin:0;">🛡️ 현재 용병</h4>
                        <div style="display:flex; gap:5px;">
                            <button onclick="openMercenaryModal()" class="btn-sm" style="background:#3498db; font-weight:bold;">👥 모집/교체</button>
                            <button onclick="openTrainingCamp()" class="btn-sm" style="background:#ff4757; font-weight:bold;">💪 훈련장 (♦️)</button>
                        </div>
                    </div>
                    <div id="current-mercenary-display" style="min-height: 80px; display:flex; align-items:center; gap:15px; padding: 5px;"></div>
                </div>
                
                <div id="dungeon-list-container">
                    <div class="war-tabs" id="war-tabs-container">
                        <button class="war-tab-btn active" onclick="switchDungeonTab('normal')" id="d-tab-normal">일반 원정</button>
                        <button class="war-tab-btn" onclick="switchDungeonTab('boss')" id="d-tab-boss">보스 토벌전</button>
                        <button class="war-tab-btn hell" onclick="switchDungeonTab('hell')" id="d-tab-hell" style="display:none;">HELL 원정</button>
                        <button class="war-tab-btn hell" onclick="switchDungeonTab('hellboss')" id="d-tab-hellboss" style="display:none;">HELL 토벌전</button>
                    </div>
                    <div id="boss-rush-info" style="display:none; background:rgba(231,76,60,0.1); border:1px solid #e74c3c; padding:10px; margin-bottom:10px; font-size:11px; color:#ffcccc; line-height:1.4;">
                        <strong style="color:#e74c3c; font-size:12px;">⚔️ 토벌전 안내</strong><br>
                        이곳은 강력한 보스들만 연속으로 출현하는 토벌전입니다. 살아남는다면 엄청난 보상과 함께 24레벨 봉인 해제 재료인 '보스 징표'를 획득할 수 있습니다.
                    </div>
                    <div id="dungeon-list"></div>
                </div>
            </div>
        </main>

        <nav id="bottom-nav">
            <button onclick="openSettings()" class="bottom-btn">⚙️ 설정</button>
            <button onclick="openCodex()" class="bottom-btn">📖 치아도감</button>
            <button onclick="openArtifacts()" class="bottom-btn" style="color:var(--gold);">🏺 유물도감</button>
            <button onclick="openRanking()" class="bottom-btn">🏆 랭킹</button>
        </nav>
    </div>

    <div id="battle-screen">
        <div id="battle-camera"><div id="battle-world"></div></div>
        <div id="battle-ui-layer">
            <div id="battle-header">
                <span id="current-dungeon-name">던전 이름</span><br>
                <span id="wave-info">WAVE 1/5</span>
            </div>
            <button onclick="exitDungeon()" class="btn-exit">후퇴</button>
            <div id="war-weapon-slots"></div>
            <div id="joystick-zone"><div id="joystick-knob"></div></div>
        </div>
    </div>

    <div id="settings-modal" class="modal-layer"><div id="settings-content" class="modal-box"></div></div>
    <div id="mercenary-modal" class="modal-layer"><div id="mercenary-content" class="modal-box"></div></div>
    <div id="codex-modal" class="modal-layer"><div id="codex-content" class="modal-box"></div></div>
    <div id="artifact-modal" class="modal-layer"><div id="artifact-content" class="modal-box"></div></div>
    <div id="locked-tooth-modal" class="modal-layer"><div id="locked-tooth-content" class="modal-box"></div></div>
    <div id="training-modal" class="modal-layer"><div id="training-content" class="modal-box"></div></div>
    <div id="ranking-modal" class="modal-layer"><div id="ranking-content" class="modal-box"></div></div>
    <div id="shop-modal" class="modal-layer"><div id="shop-content" class="modal-box"></div></div>
    <div id="tier-unlock-modal" class="modal-layer"><div id="tier-unlock-content" class="modal-box"></div></div>
    <div id="dungeon-result-modal" class="modal-layer"><div id="result-content" class="modal-box"></div></div>
    <div id="nickname-modal" class="modal-layer"><div id="nickname-content" class="modal-box"></div></div>
    <div id="guide-modal" class="modal-layer"><div id="guide-content" class="modal-box"></div></div>

    <div id="drag-proxy"></div>

    <script src="data.js?v=7.5.1"></script>
    <script src="engine.js?v=7.5.1"></script>
    <script src="action.js?v=7.5.1"></script>
    <script src="ui_core.js?v=7.5.1"></script>
    <script src="ui_modal.js?v=7.5.1"></script>
    <script src="upgrade.js?v=7.5.1"></script>
    <script src="battle.js?v=7.5.1"></script>
    <script src="combat.js?v=7.5.1"></script>
</body>
</html>
