<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>치아 연대기 v6.7.1</title>
    <link rel="stylesheet" href="style.css?v=6.7.1">
</head>
<body>
    <div id="intro-layer">
        <button id="start-btn-layer" onclick="startIntro()" ontouchend="startIntro()">
            <div id="start-btn-text">🎬 화면을 터치하세요</div>
        </button>
        <video id="intro-video" playsinline>
            <source src="assets/intro.mp4" type="video/mp4">
        </video>
        <button id="skip-btn" onclick="skipIntro()">SKIP ⏩</button>
    </div>

    <div id="hell-video-layer" style="display:none;">
        <video id="hell-video" playsinline>
            <source src="assets/hell.mp4" type="video/mp4">
        </video>
        <button id="skip-hell-btn" onclick="skipHellIntro()" style="display:none;">SKIP ⏩</button>
    </div>

    <div id="game-container">
        <nav id="top-nav">
            <button onclick="switchView('mine')" id="tab-mine" class="active">⛏️ 채굴/합성</button>
            <button onclick="switchView('refine')" id="tab-refine">🔥 Top8 제련</button>
            <button onclick="switchView('war')" id="tab-war">⚔️ 던전원정</button>
        </nav>

        <header>
            <div class="stats-bar">
                <span class="currency-group">
                    <span class="gold-text" style="color:var(--gold);">💰 <span id="gold-display">0</span></span>
                    <span class="dia-text" style="margin-left:15px; color:#ff4757;">♦️ <span id="dia-display">0</span></span>
                </span>
                <div class="control-group">
                    <button id="mine-toggle-btn" onclick="toggleMining()" class="btn-toggle" style="background:#e74c3c; color:white;">⏸️ 정지</button>
                </div>
            </div>
        </header>

        <main id="main-content">
            <div id="mine-view">
                <div id="mine-rock-area">
                    <div id="giant-tooth">🦷</div>
                    <div id="miner-char">⛏️</div>
                </div>
                <div id="pickaxe-info">
                    <div id="pickaxe-name">허름한 나무 곡괭이</div>
                    <div class="progress-wrapper">
                        <span class="progress-label">자동채굴</span>
                        <div class="progress-container"><div id="mine-bar"></div></div>
                    </div>
                    <div class="progress-wrapper">
                        <span class="progress-label">자동합성</span>
                        <div class="progress-container"><div id="merge-bar"></div></div>
                    </div>
                </div>
            </div>

            <div id="inventory-section">
                <div id="action-bar">
                    <button onclick="sortInventory()" class="btn-red">🔄 자동 정렬</button>
                    <button onclick="openShop()" class="btn-gold">💎 Upgrade Lab</button>
                </div>
                <div id="inventory-scroll-area">
                    <div id="inventory-grid"></div>
                </div>
            </div>

            <div id="refine-view" style="display:none;">
                <div class="refine-grid" id="refine-grid"></div>
            </div>

            <div id="war-view" style="display:none;">
                <div id="mercenary-camp">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h4 style="color:var(--gold); margin:0 0 10px 5px;">🏰 용병 모집 & 훈련소</h4>
                        <button onclick="openTrainingCamp()" class="btn-sm" style="background:#8e44ad; font-weight:bold; margin-bottom:5px;">💪 훈련장 입장 (♦️)</button>
                    </div>
                    <div id="mercenary-list"></div>
                </div>
                <div id="dungeon-list-container">
                    <div id="dungeon-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h3 style="margin:0;">원정 목록</h3>
                        <div id="hell-mode-toggle-container" style="display:none;">
                            <label class="switch">
                                <input type="checkbox" id="hell-mode-checkbox" onchange="toggleHellMode()">
                                <span class="slider round"></span>
                            </label>
                            <span style="color:#e74c3c; font-weight:bold; margin-left:5px; text-shadow:0 0 5px red;">HELL</span>
                        </div>
                    </div>
                    <div id="dungeon-list"></div>
                </div>
            </div>
        </main>

        <nav id="bottom-nav">
            <button onclick="openSettings()" class="bottom-btn">⚙️ 설정</button>
            <button onclick="openCodex()" class="bottom-btn">📖 도감</button>
            <button onclick="openRanking()" class="bottom-btn">🏆 랭킹</button>
        </nav>
    </div>

    <div id="battle-screen">
        <div id="battle-camera">
            <div id="battle-world"></div>
        </div>
        <div id="battle-ui-layer">
            <div id="battle-header">
                <span id="current-dungeon-name">던전 이름</span><br>
                <span id="wave-info">WAVE 1/5</span>
            </div>
            <button onclick="exitDungeon()" class="btn-exit">후퇴</button>
            <div id="war-weapon-slots"></div>
            <div id="joystick-zone">
                <div id="joystick-knob"></div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-layer">
        <div id="settings-content" class="modal-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="color:var(--gold); margin:0;">⚙️ 시스템 설정</h2>
                <button onclick="closeSettings()" style="background:none; border:none; color:#e74c3c; font-size:24px; font-weight:bold; cursor:pointer; padding:0;">✕</button>
            </div>
            <div class="settings-group">
                <h4>음향 설정</h4>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <button id="sound-toggle-btn" onclick="toggleSound()" class="btn-sm" style="flex:1;">🔊 BGM/SFX ON</button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>볼륨</span>
                    <input type="range" id="volume-slider" min="1" max="3" step="1" value="2" onchange="changeVolume()" style="width:70%;">
                </div>
            </div>
            
            <div class="settings-group">
                <h4>데이터 관리</h4>
                <div style="display:flex; gap:5px;">
                    <button onclick="saveGame(); alert('저장완료');" class="btn-sm" style="background:#27ae60; flex:1;">💾 수동 저장</button>
                    <button onclick="importSave()" class="btn-sm" style="background:#f39c12; flex:1;">📂 로드 (불러오기)</button>
                </div>
                <button onclick="checkReset()" class="btn-sm" style="background:#c0392b; width:100%; margin-top:10px;">⚠️ 데이터 완전 초기화</button>
            </div>

            <div class="settings-group">
                <h4>기타</h4>
                <div style="display:flex; gap:5px;">
                    <button onclick="openGuide()" class="btn-sm" style="background:#3498db; flex:1;">📘 게임 가이드</button>
                    <button onclick="promptCoupon()" class="btn-sm" style="background:#8e44ad; flex:1;">🎟️ 쿠폰 입력</button>
                </div>
            </div>
        </div>
    </div>

    <div id="codex-modal" class="modal-layer">
        <div id="codex-content" class="modal-box" style="width:95%; max-width:500px;">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:10px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <h2 style="color:var(--gold); margin:0;">📖 치아 도감</h2>
                    <span id="codex-progress" style="font-size:12px; color:#aaa;">수집률: 0/40</span>
                </div>
                <button onclick="closeCodex()" style="background:none; border:none; color:#e74c3c; font-size:24px; font-weight:bold; cursor:pointer; padding:0;">✕</button>
            </div>
            <div id="codex-grid" class="codex-scroll"></div>
        </div>
    </div>

    <div id="training-modal" class="modal-layer">
        <div id="training-content" class="modal-box">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:10px;">
                <h2 style="color:var(--gold); margin:0;">💪 용병 훈련장</h2>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-size:12px; color:#fff;">보유 ♦️ <span id="training-dia-display" style="color:#ff4757; font-weight:bold;">0</span></span>
                    <button onclick="closeTrainingCamp()" style="background:none; border:none; color:#e74c3c; font-size:24px; font-weight:bold; cursor:pointer; padding:0;">✕</button>
                </div>
            </div>
            <p style="font-size:11px; color:#ccc; text-align:center;">다이아를 소모하여 모든 용병의 기본 능력을 영구적으로 강화합니다.</p>
            <div id="training-list"></div>
        </div>
    </div>

    <div id="tier-unlock-modal" class="modal-layer" style="z-index: 25000;">
        <div id="tier-unlock-content" class="modal-box" style="text-align:center; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); border: 3px solid var(--gold);">
            <h1 style="color:var(--gold); text-shadow: 0 0 10px yellow; animation: blink 1s infinite;">🎉 신규 티어 개방! 🎉</h1>
            <div id="tier-unlock-icon" style="font-size:80px; margin:20px 0;"></div>
            <h3 id="tier-unlock-name" style="color:white;">-</h3>
            <div id="tier-unlock-desc" style="background:rgba(0,0,0,0.5); padding:15px; border-radius:10px; color:#2ecc71; font-weight:bold; margin:15px 0;">-</div>
            <button onclick="closeTierUnlock()" class="btn-gold" style="width:100%; font-size:16px;">멋지다! (보상 수령)</button>
        </div>
    </div>

    <div id="shop-modal" class="modal-layer"><div id="shop-content" class="modal-box"></div></div>
    
    <div id="dungeon-result-modal" class="modal-layer">
        <div id="result-content" class="modal-box" style="text-align:center;">
            <h2 id="result-title" style="color:var(--gold);">CLEAR!</h2>
            <div id="result-desc"></div>
            <button onclick="closeResultModal()" class="btn-gold" style="margin-top:20px; width:100%;">확인</button>
        </div>
    </div>

    <div id="nickname-modal" class="modal-layer" style="z-index:30000;">
        <div id="nickname-content" class="modal-box">
            <h3 style="color:var(--gold);">🆔 닉네임 설정</h3>
            <p style="font-size:12px; color:#ccc;">랭킹에 표시될 이름을 정해주세요.</p>
            <input type="text" id="nickname-input" style="width:100%; padding:10px; margin:10px 0; text-align:center; font-weight:bold;">
            <button onclick="confirmNickname()" class="btn-gold" style="width:100%;">시작하기</button>
        </div>
    </div>

    <div id="ranking-modal" class="modal-layer">
        <div id="ranking-content" class="modal-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2 style="color:var(--gold); margin:0;">🏆 명예의 전당</h2>
                <button onclick="closeRanking()" style="background:none; border:none; color:#e74c3c; font-size:24px; font-weight:bold; cursor:pointer; padding:0;">✕</button>
            </div>
            <div class="ranking-header"><span>순위</span><span>이름</span><span>던전</span><span>전투력</span></div>
            <div id="ranking-list" class="guide-scroll"></div>
            <div id="my-rank-display" style="border-top:1px solid #555; padding-top:10px; margin-top:10px; color:var(--gold); font-weight:bold;"></div>
        </div>
    </div>

    <div id="guide-modal" class="modal-layer">
        <div id="guide-content" class="modal-box">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px;">
                <h2 style="color:var(--gold); margin:0;">📘 게임 가이드</h2>
                <button onclick="closeGuide()" style="background:none; border:none; color:#e74c3c; font-size:24px; font-weight:bold; cursor:pointer; padding:0;">✕</button>
            </div>
            <div class="guide-scroll" id="guide-scroll-content"></div>
        </div>
    </div>

    <div id="drag-proxy"></div>

    <script src="data.js?v=6.7.1"></script>
    <script src="ui.js?v=6.7.1"></script>
    <script src="upgrade.js?v=6.7.1"></script>
    <script src="combat.js?v=6.7.1"></script>
    <script src="battle.js?v=6.7.1"></script>
    <script src="main.js?v=6.7.1"></script>
</body>
</html>
