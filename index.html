<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>치아 연대기 v6.9.3</title>
    <link rel="stylesheet" href="style.css?v=6.9.3">
</head>
<body>
    <div id="intro-layer">
        <button id="start-btn-layer" onclick="startIntro()" ontouchend="startIntro()">
            <div id="start-btn-text">🎬 화면을 터치하세요</div>
        </button>
        <video id="intro-video" playsinline>
            <source src="assets/intro.mp4" type="video/mp4">
        </video>
        <button id="skip-btn" onclick="skipIntro()">SKIP ⏩</button>
    </div>

    <div id="hell-video-layer" style="display:none;">
        <video id="hell-video" playsinline>
            <source src="assets/hell.mp4" type="video/mp4">
        </video>
        <button id="skip-hell-btn" onclick="skipHellIntro()" style="display:none;">SKIP ⏩</button>
    </div>

    <div id="game-container">
        <nav id="top-nav">
            <button onclick="switchView('mine')" id="tab-mine" class="active">⛏️ 채굴/합성</button>
            <button onclick="switchView('refine')" id="tab-refine">🔥 Top8 제련</button>
            <button onclick="switchView('war')" id="tab-war">⚔️ 던전원정</button>
        </nav>

        <header>
            <div class="stats-bar">
                <span class="currency-group">
                    <span class="ui-gold-text">💰 <span id="gold-display">0</span></span>
                    <span class="ui-dia-text" style="margin-left:15px;">♦️ <span id="dia-display">0</span></span>
                </span>
                <div class="control-group">
                    <button id="mine-toggle-btn" onclick="toggleMining()" class="btn-toggle" style="background:#e74c3c; color:white; font-size:10px;">⏸️ 자동채굴/합성 정지</button>
                </div>
            </div>
        </header>

        <main id="main-content">
            <div id="mine-view">
                <div id="mine-rock-area">
                    <div id="giant-tooth">🦷</div>
                    <div id="miner-char">⛏️</div>
                </div>
                <div id="pickaxe-info">
                    <div id="pickaxe-name">허름한 나무 곡괭이</div>
                    <div class="progress-wrapper">
                        <span class="progress-label">자동채굴</span>
                        <div class="progress-container"><div id="mine-bar"></div></div>
                    </div>
                    <div class="progress-wrapper">
                        <span class="progress-label">자동합성</span>
                        <div class="progress-container"><div id="merge-bar"></div></div>
                    </div>
                </div>
                
                <div id="inventory-section">
                    <div id="action-bar">
                        <button onclick="sortInventory()" class="btn-red">🔄 자동 정렬</button>
                        <button onclick="openShop()" class="btn-gold">💰 Upgrade Lab</button>
                    </div>
                    <div id="inventory-scroll-area">
                        <div id="inventory-grid"></div>
                    </div>
                </div>
            </div>

            <div id="refine-view" style="display:none;">
                <div class="refine-grid" id="refine-grid"></div>
            </div>

            <div id="war-view" style="display:none;">
                <div id="partner-section" style="margin-bottom: 15px; padding: 10px;">
                    <h4 style="color:var(--gold); margin:0 0 5px 0;">🏕️ 나의 파트너</h4>
                    <div id="equipped-mercenary-card" class="merc-card" style="width:100%; text-align:left; display:flex; padding:10px; gap:15px; box-sizing:border-box;"></div>
                    <button onclick="openGuildModal()" class="btn-gold" style="width:100%; margin-top:10px; font-size:14px; padding:12px;">🤝 용병 길드 입장 (고용 / 훈련)</button>
                </div>
                
                <div id="dungeon-list-container">
                    <div class="war-tabs" id="war-tabs-container">
                        <button class="war-tab-btn active" onclick="switchDungeonTab('normal')" id="d-tab-normal">일반 원정</button>
                        <button class="war-tab-btn" onclick="switchDungeonTab('boss')" id="d-tab-boss">보스 토벌전</button>
                        <button class="war-tab-btn hell" onclick="switchDungeonTab('hell')" id="d-tab-hell" style="display:none;">HELL 원정</button>
                        <button class="war-tab-btn hell" onclick="switchDungeonTab('hellboss')" id="d-tab-hellboss" style="display:none;">HELL 토벌전</button>
                    </div>
                    <div id="dungeon-list"></div>
                </div>
            </div>
        </main>

        <nav id="bottom-nav">
            <button onclick="openSettings()" class="bottom-btn">⚙️ 설정</button>
            <button onclick="openCodex()" class="bottom-btn">📖 도감</button>
            <button onclick="openRanking()" class="bottom-btn">🏆 랭킹</button>
        </nav>
    </div>

    <div id="battle-screen">
        <div id="battle-camera">
            <div id="battle-world"></div>
        </div>
        <div id="battle-ui-layer">
            <div id="battle-header">
                <span id="current-dungeon-name">던전 이름</span><br>
                <span id="wave-info">WAVE 1/5</span><br>
                <span id="battle-timer" style="color:#f1c40f; font-weight:bold; font-size:18px;">00:00</span>
            </div>
            <button onclick="exitDungeon()" class="btn-exit" style="position:absolute; top:15px; right:15px; padding:8px 15px; background:var(--danger); color:white; border:2px solid white; border-radius:8px; pointer-events:auto;">후퇴</button>
            <div id="war-weapon-slots"></div>
            <div id="joystick-zone"><div id="joystick-knob"></div></div>
        </div>
    </div>

    <div id="guild-modal" class="modal-layer">
        <div id="guild-content" class="modal-box">
            <div class="sticky-header">
                <h2 style="color:var(--gold); margin:0;">🏰 용병 길드</h2>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-size:12px; color:#fff;"><span id="guild-gold-display" style="color:var(--gold); font-weight:bold;">0G</span> | <span id="guild-dia-display" style="color:#ff4757; font-weight:bold;">0♦️</span></span>
                    <button onclick="closeGuildModal()" style="background:none; border:none; color:#e74c3c; font-size:24px; font-weight:bold;">✕</button>
                </div>
            </div>
            <div class="guild-tabs" style="display:flex; background:#111; padding:5px;">
                <button id="tab-hire" style="flex:1; padding:10px; background:#3498db; color:#fff; border:none;" onclick="switchGuildTab('hire')">고용/교체</button>
                <button id="tab-train" style="flex:1; padding:10px; background:#444; color:#fff; border:none;" onclick="switchGuildTab('train')">길드 훈련소</button>
            </div>
            <div class="modal-content-area" id="guild-scroll-area">
                <div id="guild-hire-view"><div id="mercenary-list" class="shop-grid"></div></div>
                <div id="guild-train-view" style="display:none;"><div id="training-list" class="shop-grid"></div></div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-layer">
        <div id="settings-content" class="modal-box">
            <div class="sticky-header"><h2>⚙️ 설정</h2><button onclick="closeSettings()">✕</button></div>
            <div class="modal-content-area">
                <p style="font-size:12px; color:#aaa;">현재 닉네임: <span id="current-nickname-display"></span></p>
                <button onclick="exportSave()" class="btn-sm" style="width:100%; background:#3498db; margin-bottom:10px;">📤 세이브 코드 복사</button>
                <button onclick="importSave()" class="btn-sm" style="width:100%; background:#f39c12;">📥 세이브 코드 붙여넣기</button>
            </div>
        </div>
    </div>

    <div id="ranking-modal" class="modal-layer">
        <div id="ranking-content" class="modal-box">
            <div class="sticky-header"><h2>🏆 랭킹</h2><button onclick="closeRanking()">✕</button></div>
            <div class="modal-content-area"><div id="ranking-list"></div><div id="my-rank-display" style="text-align:center; color:var(--gold); margin-top:10px;"></div></div>
        </div>
    </div>

    <div id="codex-modal" class="modal-layer">
        <div id="codex-content" class="modal-box">
            <div class="sticky-header"><h2>📖 도감</h2><button onclick="closeCodex()">✕</button></div>
            <div class="modal-content-area"><div id="codex-grid" class="shop-grid"></div></div>
        </div>
    </div>

    <div id="shop-modal" class="modal-layer"><div id="shop-content" class="modal-box"></div></div>

    <div id="dungeon-result-modal" class="modal-layer">
        <div id="result-content" class="modal-box" style="text-align:center; padding:20px;">
            <h2 id="result-title" style="color:var(--gold);">CLEAR!</h2>
            <div id="result-desc"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="retryDungeon()" class="btn-gold" style="flex:1;">🔄 다시</button>
                <button id="next-dungeon-btn" onclick="nextDungeon()" class="btn-gold" style="flex:1;">▶️ 다음</button>
                <button onclick="closeResultModal()" class="btn-gold" style="flex:1; background:#e74c3c!important; color:#fff!important; border:none;">🏠 나가기</button>
            </div>
        </div>
    </div>

    <div id="nickname-modal" class="modal-layer">
        <div id="nickname-content" class="modal-box" style="padding:20px; text-align:center;">
            <h3>🆔 닉네임 설정</h3>
            <input type="text" id="nickname-input" style="width:100%; padding:10px; margin:15px 0; background:#222; color:#fff; border:1px solid #444;">
            <button onclick="confirmNickname()" class="btn-gold" style="width:100%;">시작</button>
        </div>
    </div>

    <div id="drag-proxy"></div>

    <script src="data.js?v=6.9.3"></script>
    <script src="ui.js?v=6.9.3"></script>
    <script src="upgrade.js?v=6.9.3"></script>
    <script src="combat.js?v=6.9.3"></script>
    <script src="battle.js?v=6.9.3"></script>
    <script src="main.js?v=6.9.3"></script>
</body>
</html>
